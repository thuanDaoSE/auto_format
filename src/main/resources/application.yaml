spring:
  application:
    name: vietDoc
  jpa:
    hibernate:
      ddl-auto: update
      # ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/vietdoc_db
    username: postgres
    password: Td12345678@
    driver-class-name: org.postgresql.Driver
    hikari:
      # Đặt con số này bằng hoặc lớn hơn số user bạn test (ví dụ: 100)
      # Cảnh báo: Đặt quá cao trong thực tế có thể làm sập CSDL
      maximum-pool-size: 40 
      # Có thể đặt thêm thời gian chờ connection (mặc định là 30s)
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    # Kích hoạt Flyway (mặc định là true)
    enabled: false
    # Đường dẫn đến các file migration (đây là mặc định)
    locations: classpath:db/migration